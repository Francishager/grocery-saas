[build]
builder = "nixpacks"

[deploy]
startCommand = "node backend/server.js"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
internal_port = 3000
external_port = 3000

[services.healthcheck]
path = "/"
interval = "30s"
timeout = "5s"
